<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretect — Unit History</title>
<style>
  :root {
    --navy: #1F2D3D;
    --navy-light: #2C3E50;
    --red: #C0392B;
    --gray-bg: #F4F5F7;
    --gray-line: #DADFE3;
    --gray-text: #5A6470;
    --good: #2E7D32;
    --watch: #B8860B;
    --bad: #C0392B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--navy);
  }
  header {
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  header .sub {
    font-size: 12px;
    color: #AEB8C2;
    margin-top: 2px;
  }
  .search-bar {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid var(--gray-line);
    position: sticky;
    top: 64px;
    z-index: 9;
  }
  .search-bar input {
    flex: 1;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--gray-line);
    border-radius: 6px;
    outline: none;
  }
  .search-bar input:focus {
    border-color: var(--navy-light);
  }
  .search-bar button {
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .search-bar button:active { opacity: 0.85; }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }
  .state-msg {
    text-align: center;
    color: var(--gray-text);
    font-size: 14px;
    padding: 40px 20px;
  }
  .unit-banner {
    background: white;
    border: 1px solid var(--gray-line);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .unit-banner .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-text);
    margin-bottom: 2px;
  }
  .unit-banner .value {
    font-size: 20px;
    font-weight: 700;
  }
  .unit-banner .count {
    font-size: 13px;
    color: var(--gray-text);
    margin-top: 4px;
  }
  .visit-card {
    background: white;
    border: 1px solid var(--gray-line);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .visit-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .visit-head:active { background: var(--gray-bg); }
  .visit-date {
    font-weight: 700;
    font-size: 15px;
  }
  .visit-tech {
    font-size: 12px;
    color: var(--gray-text);
    margin-top: 2px;
  }
  .status-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .status-good { background: #E8F5E9; color: var(--good); }
  .status-watch { background: #FFF8E1; color: var(--watch); }
  .status-bad { background: #FDECEA; color: var(--bad); }
  .status-neutral { background: #ECEFF1; color: var(--gray-text); }
  .visit-body {
    display: none;
    padding: 0 16px 16px 16px;
    border-top: 1px solid var(--gray-line);
  }
  .visit-body.open { display: block; }
  .field-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #EFEFEF;
    font-size: 13px;
    gap: 12px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row .k {
    color: var(--gray-text);
    flex-shrink: 0;
  }
  .field-row .v {
    text-align: right;
    font-weight: 500;
  }
  .notes-block {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--gray-bg);
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
  }
  .notes-block .k {
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--gray-text);
    margin-bottom: 4px;
  }
  .chevron {
    transition: transform 0.15s ease;
    color: var(--gray-text);
    font-size: 12px;
  }
  .chevron.open { transform: rotate(180deg); }
  .error-box {
    background: #FDECEA;
    border: 1px solid #F5C6C2;
    color: var(--bad);
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .config-note {
    font-size: 11px;
    color: var(--gray-text);
    text-align: center;
    padding: 24px 16px 8px 16px;
  }
</style>
</head>
<body>

<header>
  <h1>PRETECT — Unit Service History</h1>
  <div class="sub">Search by Unit ID to see every past inspection</div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="e.g. CHWP-2" autocomplete="off" />
  <button id="searchBtn">Search</button>
</div>

<main id="results">
  <div class="state-msg">Enter a Unit ID above to pull its full service history.</div>
</main>

<div class="config-note">Internal tool — Pretect field use only</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────
// NOTE: For local testing this token is hardcoded. Before deploying
// to a real web server, this MUST be moved to a backend proxy —
// never ship an API token inside client-side JS that loads on
// techs' phones. See note at bottom of chat for the production plan.
const API_TOKEN = 'd6223d4f0377f79f283b2afcfc3726661188a4feb047f9519e7720c67636adb15e5e4141118dac6b';
const VFD_FORM_ID = '6c231c72-8a9b-403c-86fc-8ed66e4dc919';
const API_BASE = 'https://api.fulcrumapp.com/api/v2';

// ─────────────────────────────────────────────────────────────
// AUTO-SEARCH FROM URL PARAMETER (?unit=CHWP-2)
// This is what the Fulcrum form's "View Unit History" link will use
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const unitParam = params.get('unit');
  if (unitParam) {
    document.getElementById('searchInput').value = unitParam;
    runSearch(unitParam);
  }
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const val = document.getElementById('searchInput').value.trim();
  if (val) runSearch(val);
});
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) runSearch(val);
  }
});

async function runSearch(unitName) {
  const results = document.getElementById('results');
  results.innerHTML = '<div class="state-msg">Searching…</div>';

  try {
    // Fulcrum Query API: query all records in the VFD form where the
    // record's title/search text matches the unit name.
    // Using the /records.json endpoint with a 'form_id' filter, then
    // filtering client-side by unit_id display value, since linked-record
    // text matching is unreliable server-side for this field type.
    const url = `${API_BASE}/records.json?form_id=${VFD_FORM_ID}`;

    const resp = await fetch(url, {
      headers: { 'X-ApiToken': API_TOKEN }
    });

    if (!resp.ok) {
      throw new Error(`API returned ${resp.status}`);
    }

    const data = await resp.json();
    const allRecords = data.records || [];

    // Filter records where the linked unit_id field's display value
    // matches the searched unit name (case-insensitive partial match)
    const matches = allRecords.filter(r => {
      const formValues = r.form_values || {};
      // unit_id field comes back as an array of linked record refs
      const unitField = Object.values(formValues).find(v =>
        Array.isArray(v) && v[0] && v[0].record_name
      );
      if (!unitField) return false;
      const unitDisplayName = unitField[0].record_name || '';
      return unitDisplayName.toLowerCase().includes(unitName.toLowerCase());
    });

    renderResults(unitName, matches);

  } catch (err) {
    results.innerHTML = `
      <div class="error-box">
        <strong>Could not load history.</strong><br><br>
        ${err.message}<br><br>
        This usually means the API token needs refreshing, or the form ID changed.
        Check the configuration at the top of this page's code.
      </div>
    `;
  }
}

function renderResults(unitName, records) {
  const results = document.getElementById('results');

  if (records.length === 0) {
    results.innerHTML = `<div class="state-msg">No service history found for <strong>${escapeHtml(unitName)}</strong>.</div>`;
    return;
  }

  // Sort newest first
  records.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const displayUnit = getFieldDisplayValue(records[0], 'unit_id') || unitName;
  const buildingName = getFieldValue(records[0], 'building_name') || '';

  let html = `
    <div class="unit-banner">
      <div class="label">Unit</div>
      <div class="value">${escapeHtml(displayUnit)}</div>
      ${buildingName ? `<div class="count">${escapeHtml(buildingName)}</div>` : ''}
      <div class="count">${records.length} visit${records.length === 1 ? '' : 's'} on record</div>
    </div>
  `;

  records.forEach((r, idx) => {
    const date = getFieldValue(r, 'visit_date') || formatDate(r.created_at);
    const tech = getFieldValue(r, 'technician') || 'Unknown';
    const result = getFieldValue(r, 'unit_result') || '';
    const notes = getFieldValue(r, 'note') || '';
    const followUp = getFieldValue(r, 'follow_up_description_if_yes') || '';
    const makeModel = getFieldValue(r, 'make_model_read_only') || '';
    const voltage = getFieldValue(r, 'unit_voltage_read_only') || '';
    const hz = getFieldValue(r, 'running_hz_if_pm') || '';
    const amps = getFieldValue(r, 'running_amperage_if_pm') || '';
    const condition = getFieldValue(r, 'overall_unit_condition_if_pm') || '';

    const statusClass = getStatusClass(result);

    html += `
      <div class="visit-card">
        <div class="visit-head" onclick="toggleCard(${idx})">
          <div>
            <div class="visit-date">${escapeHtml(date)}</div>
            <div class="visit-tech">${escapeHtml(tech)}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="status-pill ${statusClass}">${escapeHtml(result || 'No status')}</span>
            <span class="chevron" id="chev-${idx}">▼</span>
          </div>
        </div>
        <div class="visit-body" id="body-${idx}">
          ${makeModel ? `<div class="field-row"><span class="k">Make / Model</span><span class="v">${escapeHtml(makeModel)}</span></div>` : ''}
          ${voltage ? `<div class="field-row"><span class="k">Voltage</span><span class="v">${escapeHtml(voltage)}</span></div>` : ''}
          ${hz ? `<div class="field-row"><span class="k">Running Hz</span><span class="v">${escapeHtml(hz)}</span></div>` : ''}
          ${amps ? `<div class="field-row"><span class="k">Running Amps</span><span class="v">${escapeHtml(amps)}</span></div>` : ''}
          ${condition ? `<div class="field-row"><span class="k">Overall Condition</span><span class="v">${escapeHtml(condition)}</span></div>` : ''}
          ${notes ? `<div class="notes-block"><div class="k">Notes</div>${escapeHtml(notes)}</div>` : ''}
          ${followUp ? `<div class="notes-block"><div class="k">Follow-up</div>${escapeHtml(followUp)}</div>` : ''}
        </div>
      </div>
    `;
  });

  results.innerHTML = html;
}

function toggleCard(idx) {
  const body = document.getElementById(`body-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function getStatusClass(result) {
  if (!result) return 'status-neutral';
  const r = result.toLowerCase();
  if (r.includes('immediate') || r.includes('not access')) return 'status-bad';
  if (r.includes('follow-up') || r.includes('deferred')) return 'status-watch';
  if (r.includes('good') || r.includes('serviced')) return 'status-good';
  return 'status-neutral';
}

function getFieldValue(record, key) {
  const fv = record.form_values || {};
  for (const k in fv) {
    if (k.includes(key) || k === key) {
      const val = fv[k];
      if (typeof val === 'string') return val;
      if (Array.isArray(val) && val[0]) return val[0].choice_values ? val[0].choice_values.join(', ') : (val[0].record_name || '');
    }
  }
  return null;
}

function getFieldDisplayValue(record, key) {
  const fv = record.form_values || {};
  for (const k in fv) {
    if (k.includes(key)) {
      const val = fv[k];
      if (Array.isArray(val) && val[0]) return val[0].record_name || null;
    }
  }
  return null;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
