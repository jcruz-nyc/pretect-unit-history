<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretect — Unit History</title>
<style>
  :root {
    --navy: #1F2D3D;
    --navy-light: #2C3E50;
    --red: #C0392B;
    --gray-bg: #F4F5F7;
    --gray-line: #DADFE3;
    --gray-text: #5A6470;
    --good: #2E7D32;
    --watch: #B8860B;
    --bad: #C0392B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--navy);
  }
  header {
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
  header .sub { font-size: 12px; color: #AEB8C2; margin-top: 2px; }
  .search-bar {
    display: flex; gap: 8px; padding: 14px 16px;
    background: white; border-bottom: 1px solid var(--gray-line);
    position: sticky; top: 64px; z-index: 9;
  }
  .search-bar input {
    flex: 1; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--gray-line); border-radius: 6px; outline: none;
  }
  .search-bar input:focus { border-color: var(--navy-light); }
  .search-bar button {
    padding: 10px 18px; font-size: 14px; font-weight: 600;
    background: var(--red); color: white; border: none; border-radius: 6px; cursor: pointer;
  }
  .search-bar button:active { opacity: 0.85; }
  main { max-width: 720px; margin: 0 auto; padding: 16px; }
  .state-msg { text-align: center; color: var(--gray-text); font-size: 14px; padding: 40px 20px; }
  .unit-banner {
    background: white; border: 1px solid var(--gray-line); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .unit-banner .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-text); margin-bottom: 2px; }
  .unit-banner .value { font-size: 20px; font-weight: 700; }
  .unit-banner .count { font-size: 13px; color: var(--gray-text); margin-top: 4px; }
  .visit-card { background: white; border: 1px solid var(--gray-line); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .visit-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; user-select: none; }
  .visit-head:active { background: var(--gray-bg); }
  .visit-date { font-weight: 700; font-size: 15px; }
  .visit-tech { font-size: 12px; color: var(--gray-text); margin-top: 2px; }
  .status-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
  .status-good { background: #E8F5E9; color: var(--good); }
  .status-watch { background: #FFF8E1; color: var(--watch); }
  .status-bad { background: #FDECEA; color: var(--bad); }
  .status-neutral { background: #ECEFF1; color: var(--gray-text); }
  .visit-body { display: none; padding: 0 16px 16px 16px; border-top: 1px solid var(--gray-line); }
  .visit-body.open { display: block; }
  .field-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #EFEFEF; font-size: 13px; gap: 12px; }
  .field-row:last-child { border-bottom: none; }
  .field-row .k { color: var(--gray-text); flex-shrink: 0; }
  .field-row .v { text-align: right; font-weight: 500; }
  .notes-block { margin-top: 10px; padding: 10px 12px; background: var(--gray-bg); border-radius: 6px; font-size: 13px; line-height: 1.5; }
  .notes-block .k { font-weight: 700; font-size: 11px; text-transform: uppercase; color: var(--gray-text); margin-bottom: 4px; }
  .chevron { transition: transform 0.15s ease; color: var(--gray-text); font-size: 12px; }
  .chevron.open { transform: rotate(180deg); }
  .error-box { background: #FDECEA; border: 1px solid #F5C6C2; color: var(--bad); padding: 14px 16px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .config-note { font-size: 11px; color: var(--gray-text); text-align: center; padding: 24px 16px 8px 16px; }
</style>
</head>
<body>

<header>
  <h1>PRETECT — Unit Service History</h1>
  <div class="sub">Search by Unit ID to see every past inspection</div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="e.g. CHWP-2" autocomplete="off" />
  <button id="searchBtn">Search</button>
</div>

<main id="results">
  <div class="state-msg">Enter a Unit ID above to pull its full service history.</div>
</main>

<div class="config-note">Internal tool — Pretect field use only</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────
// SECURITY NOTE: This token is hardcoded for local/internal testing only.
// Before this is shared with field techs, the token must move to a small
// backend proxy so it never sits in plain client-side JS that anyone can
// view-source. See chat for the production plan when ready.
const API_TOKEN = 'd6223d4f0377f79f283b2afcfc3726661188a4feb047f9519e7720c67636adb15e5e4141118dac6b';
const VFD_FORM_ID = '6c231c72-8a9b-403c-86fc-8ed66e4dc919';
const EQUIPMENT_FORM_ID = '0bf1e57e-68fa-4925-b9bf-a99d101003ce';
const API_BASE = 'https://api.fulcrumapp.com/api/v2';

// Real Fulcrum field codes, confirmed from live API response on 6/20/2026.
// If you add/rename fields in Fulcrum later, these codes may need updating —
// open a VFD PM record's raw API response to re-check.
const FIELD = {
  building_name: '6abb',        // text field, "LaGuardia Airport "
  overall_condition: '9760',    // choice: Good / etc
  wo_number: '3e7b',            // BlueFolder WO #
  make_model: '46d2',           // Make/Model read-only
  unit_voltage: 'af00',         // Unit Voltage read-only
  service_type: '1f80',         // choice
  unit_id: '59f0',              // LINKED RECORD -> Equipment Registry
  technician: '2450',           // choice
  visit_date: '1320',           // date text "YYYY-MM-DD"
  building: '7e97',             // LINKED RECORD -> Clients & Buildings
  note: '1b98',                 // free text notes
  follow_up_required: '54e6',   // yes/no text
  unit_result: '27f0',          // choice: Serviced - Unit Good, etc.

  // Equipment Registry field — the unit's display name/tag.
  // NOTE: verify this is correct by checking an Equipment Registry record's
  // raw API response; only confirmed indirectly so far.
  equipment_unit_tag: 'unit_tag'
};

// ─────────────────────────────────────────────────────────────
// AUTO-SEARCH FROM URL PARAMETER (?unit=CHWP-2)
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const unitParam = params.get('unit');
  if (unitParam) {
    document.getElementById('searchInput').value = unitParam;
    runSearch(unitParam);
  }
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const val = document.getElementById('searchInput').value.trim();
  if (val) runSearch(val);
});
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) runSearch(val);
  }
});

async function runSearch(unitName) {
  const results = document.getElementById('results');
  results.innerHTML = '<div class="state-msg">Searching…</div>';

  try {
    // Step 1: Pull all VFD PM records
    const vfdUrl = `${API_BASE}/records.json?form_id=${VFD_FORM_ID}`;
    const vfdResp = await fetch(vfdUrl, { headers: { 'X-ApiToken': API_TOKEN } });
    if (!vfdResp.ok) throw new Error(`VFD API returned ${vfdResp.status}`);
    const vfdData = await vfdResp.json();
    const allRecords = vfdData.records || [];

    // Step 2: Collect every unique linked Equipment Registry record_id
    // referenced by the unit_id field across all VFD records
    const equipmentIds = new Set();
    allRecords.forEach(r => {
      const unitLink = r.form_values[FIELD.unit_id];
      if (Array.isArray(unitLink) && unitLink[0] && unitLink[0].record_id) {
        equipmentIds.add(unitLink[0].record_id);
      }
    });

    // Step 3: Pull Equipment Registry records so we can resolve IDs -> names
    const eqUrl = `${API_BASE}/records.json?form_id=${EQUIPMENT_FORM_ID}`;
    const eqResp = await fetch(eqUrl, { headers: { 'X-ApiToken': API_TOKEN } });
    if (!eqResp.ok) throw new Error(`Equipment Registry API returned ${eqResp.status}`);
    const eqData = await eqResp.json();
    const eqRecords = eqData.records || [];

    // Build a lookup: equipment record_id -> Unit Tag display name
    const eqNameById = {};
    eqRecords.forEach(eq => {
      const tagVal = eq.form_values[FIELD.equipment_unit_tag];
      let name = null;
      if (typeof tagVal === 'string' && tagVal.trim()) {
        name = tagVal.trim();
      } else if (tagVal && tagVal.choice_values && tagVal.choice_values.length) {
        name = tagVal.choice_values.join(', ');
      }
      eqNameById[eq.id] = name || '(unnamed unit)';
    });

    // Step 4: Filter VFD records where the resolved unit name matches the search
    const matches = allRecords.filter(r => {
      const unitLink = r.form_values[FIELD.unit_id];
      if (!Array.isArray(unitLink) || !unitLink[0]) return false;
      const eqId = unitLink[0].record_id;
      const name = eqNameById[eqId] || '';
      return name.toLowerCase().includes(unitName.toLowerCase());
    });

    matches.forEach(r => {
      const unitLink = r.form_values[FIELD.unit_id];
      const eqId = unitLink && unitLink[0] ? unitLink[0].record_id : null;
      r._resolvedUnitName = eqId ? (eqNameById[eqId] || 'Unknown unit') : 'Unknown unit';
    });

    renderResults(unitName, matches);

  } catch (err) {
    results.innerHTML = `
      <div class="error-box">
        <strong>Could not load history.</strong><br><br>
        ${escapeHtml(err.message)}<br><br>
        Check the API token and form IDs in the configuration section of this page's code.
      </div>
    `;
  }
}

function renderResults(unitName, records) {
  const results = document.getElementById('results');

  if (records.length === 0) {
    results.innerHTML = `<div class="state-msg">No service history found for <strong>${escapeHtml(unitName)}</strong>.</div>`;
    return;
  }

  records.sort((a, b) => {
    const dateA = a.form_values[FIELD.visit_date] || a.created_at;
    const dateB = b.form_values[FIELD.visit_date] || b.created_at;
    return new Date(dateB) - new Date(dateA);
  });

  const displayUnit = records[0]._resolvedUnitName || unitName;
  const buildingName = getChoiceOrText(records[0], FIELD.building_name);

  let html = `
    <div class="unit-banner">
      <div class="label">Unit</div>
      <div class="value">${escapeHtml(displayUnit)}</div>
      ${buildingName ? `<div class="count">${escapeHtml(buildingName)}</div>` : ''}
      <div class="count">${records.length} visit${records.length === 1 ? '' : 's'} on record</div>
    </div>
  `;

  records.forEach((r, idx) => {
    const fv = r.form_values;
    const rawDate = fv[FIELD.visit_date] || r.created_at;
    const tech = getChoiceOrText(r, FIELD.technician) || 'Unknown';
    const result = getChoiceOrText(r, FIELD.unit_result) || '';
    const notes = fv[FIELD.note] || '';
    const makeModel = fv[FIELD.make_model] || '';
    const voltage = fv[FIELD.unit_voltage] || '';
    const condition = getChoiceOrText(r, FIELD.overall_condition) || '';
    const wo = fv[FIELD.wo_number] || '';

    const statusClass = getStatusClass(result);

    html += `
      <div class="visit-card">
        <div class="visit-head" onclick="toggleCard(${idx})">
          <div>
            <div class="visit-date">${escapeHtml(formatDate(rawDate))}</div>
            <div class="visit-tech">${escapeHtml(tech)}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="status-pill ${statusClass}">${escapeHtml(result || 'No status')}</span>
            <span class="chevron" id="chev-${idx}">▼</span>
          </div>
        </div>
        <div class="visit-body" id="body-${idx}">
          ${makeModel ? `<div class="field-row"><span class="k">Make / Model</span><span class="v">${escapeHtml(makeModel)}</span></div>` : ''}
          ${voltage ? `<div class="field-row"><span class="k">Voltage</span><span class="v">${escapeHtml(voltage)}</span></div>` : ''}
          ${condition ? `<div class="field-row"><span class="k">Overall Condition</span><span class="v">${escapeHtml(condition)}</span></div>` : ''}
          ${wo ? `<div class="field-row"><span class="k">WO #</span><span class="v">${escapeHtml(wo)}</span></div>` : ''}
          ${notes ? `<div class="notes-block"><div class="k">Notes</div>${escapeHtml(notes)}</div>` : ''}
        </div>
      </div>
    `;
  });

  results.innerHTML = html;
}

function getChoiceOrText(record, fieldCode) {
  const val = record.form_values[fieldCode];
  if (!val) return null;
  if (typeof val === 'string') return val;
  if (val.choice_values && val.choice_values.length) return val.choice_values.join(', ');
  if (val.other_values && val.other_values.length) return val.other_values.join(', ');
  return null;
}

function toggleCard(idx) {
  const body = document.getElementById(`body-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function getStatusClass(result) {
  if (!result) return 'status-neutral';
  const r = result.toLowerCase();
  if (r.includes('immediate') || r.includes('not access')) return 'status-bad';
  if (r.includes('follow-up') || r.includes('deferred')) return 'status-watch';
  if (r.includes('good') || r.includes('serviced')) return 'status-good';
  return 'status-neutral';
}

function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
